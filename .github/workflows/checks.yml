name: checks

# Lightweight static + regression checks on every push / PR (separate from the
# release gate in release.yml, which builds + smoke-tests the frozen bundle).
#
# Blocking: byte-compile everything, and run the pure-Python regression guards
# (the export-engine / GUI-bridge / updater audit-fix checks AND the
# regression-locked comparison-engine + consolidator checks). Advisory
# (surface findings, never block a push): ruff error rules, bandit, pip-audit.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime deps + lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit

      - name: Install Chromium for the fake-site selector tests
        # Best-effort: check_fake_site falls back to the runner's system Edge and
        # skips cleanly if no browser is drivable, so a CDN/network blip on this
        # download must not red the whole job.
        continue-on-error: true
        run: python -m playwright install chromium

      - name: Byte-compile all sources (blocking)
        run: python -m compileall -q scripts build version.py

      - name: Export-engine regression checks (blocking)
        run: python build/check_export_engine.py

      - name: GUI-bridge regression checks (blocking)
        shell: bash
        run: |
          set -e
          python build/check_gui_bridge.py
          python build/check_a2_compare_filter.py
          python build/check_b1_pause.py
          python build/check_b2_autoconsolidate.py
          python build/check_b3_batch.py
          python build/check_report_library.py

      - name: Updater regression checks (blocking)
        run: python build/check_updater.py

      - name: Fake-site selector-contract checks (blocking)
        run: python build/check_fake_site.py

      - name: Comparison-engine regression checks (blocking)
        # The regression-locked compare_core + consolidators. Pure openpyxl /
        # pdfplumber — no Excel, no browser, no network. `set -e` stops at the
        # first failing check so a silent break in the comparison engine reds
        # the job (matches the per-check blocking intent of the steps above).
        shell: bash
        run: |
          set -e
          for c in check_compare_blankkey check_compare_keyfield check_compare_skipwarn \
                   check_compare_injection check_compare_coercion check_compare_limits \
                   check_compare_audit check_compare_ramp_detail check_compare_ramp_summary \
                   check_compare_dupmatch check_compare_ditto check_ramp_summary_partial \
                   check_tsn_description_leak check_tsmis_pdf_parse \
                   check_highway_log_columns check_highway_log_ditto check_highway_log_roadbed \
                   check_a1_filenames; do
            echo "::group::$c"
            python "build/$c.py"
            echo "::endgroup::"
          done

      - name: ruff (error rules — advisory)
        continue-on-error: true
        run: ruff check scripts --select E9,F63,F7,F82 --output-format=github

      - name: bandit (high severity / high confidence — advisory)
        continue-on-error: true
        run: bandit -r scripts -lll -iii

      - name: pip-audit (known-vulnerable deps — advisory)
        continue-on-error: true
        run: pip-audit -r requirements.txt
