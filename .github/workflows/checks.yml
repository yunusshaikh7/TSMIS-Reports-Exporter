name: checks

# Lightweight static + regression checks on every push / PR (separate from the
# release gate in release.yml, which builds + smoke-tests the frozen bundle).
#
# Blocking: byte-compile everything, and run the pure-Python regression guards
# (the export-engine / GUI-bridge / updater audit-fix checks AND the
# regression-locked comparison-engine + consolidator checks). Advisory
# (surface findings, never block a push): ruff error rules, bandit, pip-audit.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      # The regression checks print Unicode (e.g. the " ≠ " diff marker); the
      # Windows runner's default cp1252 stdout would crash on it. Force UTF-8.
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime deps + lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit

      - name: Install Chromium for the fake-site selector tests
        # Best-effort: check_fake_site falls back to the runner's system Edge and
        # skips cleanly if no browser is drivable, so a CDN/network blip on this
        # download must not red the whole job.
        continue-on-error: true
        run: python -m playwright install chromium

      - name: Byte-compile all sources (blocking)
        run: python -m compileall -q scripts build version.py

      - name: Full offline check suite (blocking — the ONE list)
        # U1 (v0.19.0): the check list lives ONLY in build/run_checks.py's
        # glob (every build/check_*.py + check_*.js). A new check file is
        # picked up automatically — no YAML edit, nothing to forget.
        # -k keeps going so ONE run reports every failure; non-zero exit
        # if anything failed.
        run: python build/run_checks.py -j 4 -k

      - name: ruff (error rules — BLOCKING; T2/ARC-01)
        # F821 everywhere (the BUG-01 NameError class), F811, F401 (shims
        # exempted in pyproject). The select set lives in pyproject.toml.
        run: ruff check scripts --output-format=github

      - name: bandit (high severity / high confidence — advisory)
        continue-on-error: true
        run: bandit -r scripts -lll -iii

      - name: pip-audit (known-vulnerable deps — advisory)
        continue-on-error: true
        run: pip-audit -r requirements.txt
