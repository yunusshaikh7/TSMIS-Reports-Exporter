name: checks

# Lightweight static + regression checks on every push / PR (separate from the
# release gate in release.yml, which builds + smoke-tests the frozen bundle).
#
# Blocking: byte-compile everything, and run the pure-Python regression guards
# (the export-engine / GUI-bridge / updater audit-fix checks AND the
# regression-locked comparison-engine + consolidator checks). Advisory
# (surface findings, never block a push): ruff error rules, bandit, pip-audit.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      # The regression checks print Unicode (e.g. the " ≠ " diff marker); the
      # Windows runner's default cp1252 stdout would crash on it. Force UTF-8.
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime deps + lint tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit pip-audit

      - name: Install Chromium for the fake-site selector tests
        # Best-effort: check_fake_site falls back to the runner's system Edge and
        # skips cleanly if no browser is drivable, so a CDN/network blip on this
        # download must not red the whole job.
        continue-on-error: true
        run: python -m playwright install chromium

      - name: Byte-compile all sources (blocking)
        run: python -m compileall -q scripts build version.py

      - name: Product-name guard (blocking)
        # Fails the build if the product name is ever mis-typed — it is always TSMIS.
        run: python build/check_no_misspelling.py

      - name: Export-engine regression checks (blocking)
        shell: bash
        run: |
          set -e
          python build/check_engine_leaves.py
          python build/check_engine_layers.py
          python build/check_export_engine.py
          python build/check_parallel_reconcile.py
          python build/check_intersection_gate.py

      - name: GUI-bridge + diagnostics regression checks (blocking)
        shell: bash
        run: |
          set -e
          python build/check_gui_bridge.py
          python build/check_ui_contract.py
          python build/check_persistence.py
          python build/check_a2_compare_filter.py
          python build/check_b1_pause.py
          python build/check_b2_autoconsolidate.py
          python build/check_b3_batch.py
          python build/check_stable_ids.py
          python build/check_report_catalog.py
          python build/check_report_library.py
          python build/check_matrix.py
          python build/check_matrix_bridge.py
          python build/check_matrix_tsn.py
          python build/check_day_matrix.py
          python build/check_worker_lifecycle.py
          python build/check_import_direction.py

      - name: Outcome contract + cache-envelope checks (blocking)
        # P1: the orthogonal completion/artifact contract (outcome.py), the
        # producer-owned consolidation completion + F3 honoring, read_counts layout
        # detection (F4/O4), and the versioned matrix cache migration.
        shell: bash
        run: |
          set -e
          python build/check_outcome_contract.py
          python build/check_read_counts_layout.py
          python build/check_consolidate_outcome.py
          python build/check_export_summary_outcome.py
          python build/check_batch_outcome.py
          python build/check_tsn_outcome.py
          python build/check_tsn_normalizer.py

      - name: Transactional artifact lifecycle checks (blocking)
        # P2: atomic single-file write (F9), journaled store promotion + startup
        # recovery (F2), the multi-file commit policy (CT-8b), and identity-based
        # freshness (F5) across the matrix + by-day engines. Stdlib + openpyxl;
        # no browser/network.
        shell: bash
        run: |
          set -e
          python build/check_artifact_store.py
          python build/check_p2_freshness.py

      - name: Frontend renderer + routing checks (blocking)
        # P1-R01: a matrix cell built from PARTIAL consolidation inputs must render
        # distinctly from a fully-valid match (mxCellContent -> mx-partial, not the
        # green mx-match). P3-B03: the Compare tab resolves a row's KIND by its
        # stable cmp:* key and routes folders/files comparisons correctly. Pure Node
        # (the runner ships Node) — no browser/server.
        shell: bash
        run: |
          set -e
          node build/check_mx_partial_render.js
          node build/check_compare_routing.js
          node build/check_ui_boot.js

      - name: Packaging + console-flow checks (blocking)
        # Offline half of the exact-artifact gate (PA): APP_MODULES is the complete,
        # reachable flat-module inventory (F6 tripwire), and the source-ZIP console
        # menu→module dispatch imports + resolves. The FROZEN exe half runs in
        # frozen-gate.yml / release.yml.
        shell: bash
        run: |
          set -e
          python build/check_app_modules.py
          python build/check_source_zip_smoke.py

      - name: Updater regression checks (blocking)
        run: python build/check_updater.py

      - name: Fake-site selector-contract checks (blocking)
        run: python build/check_fake_site.py

      - name: Comparison-engine regression checks (blocking)
        # The regression-locked compare_core + consolidators. Pure openpyxl /
        # pdfplumber — no Excel, no browser, no network. `set -e` stops at the
        # first failing check so a silent break in the comparison engine reds
        # the job (matches the per-check blocking intent of the steps above).
        shell: bash
        run: |
          set -e
          for c in check_compare_blankkey check_compare_keyfield check_compare_skipwarn \
                   check_compare_injection check_compare_coercion check_compare_limits \
                   check_compare_audit check_compare_ramp_detail check_compare_ramp_summary \
                   check_compare_highway_sequence check_compare_ramp_detail_tsn \
                   check_compare_ramp_summary_tsn check_compare_intersection_summary_tsn \
                   check_compare_intersection_detail_tsn check_compare_highway_sequence_tsn \
                   check_compare_tsn_common \
                   check_compare_env_intersection check_compare_env_highway_log_pdf \
                   check_compare_env_sidelabel \
                   check_compare_dupmatch check_compare_ditto check_ramp_summary_partial \
                   check_ramp_summary_schema check_consolidate_intersection \
                   check_tsn_description_leak check_tsmis_pdf_parse check_tsmis_pdf_reconcile \
                   check_highway_log_columns check_highway_log_ditto check_highway_log_roadbed \
                   check_a1_filenames; do
            echo "::group::$c"
            python "build/$c.py"
            echo "::endgroup::"
          done

      - name: ruff (error rules — advisory)
        continue-on-error: true
        run: ruff check scripts --select E9,F63,F7,F82 --output-format=github

      - name: bandit (high severity / high confidence — advisory)
        continue-on-error: true
        run: bandit -r scripts -lll -iii

      - name: pip-audit (known-vulnerable deps — advisory)
        continue-on-error: true
        run: pip-audit -r requirements.txt
