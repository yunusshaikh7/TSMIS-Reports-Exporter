name: release

# Builds the three Windows release variants and publishes them as a GitHub
# release whenever a version tag (v*) is pushed. Each windowed variant is built
# with -SelfTest, which runs the EXACT shipped exe's `--self-test` over the
# pruned bundle (browser launch + page.pdf + download, pdfplumber, openpyxl,
# every app module + the GUI bridge) — once against the runner's system
# Edge/Chrome and once against the bundled Chromium. The artifact that ships is
# the artifact that passed the gate (R1-B04), so a broken bundle can never ship.
# The batch/source variant is gated by the offline console-flow smoke.
#
# Variants published:
#   *-win64.zip               portable app; drives the machine's installed Edge/Chrome
#   *-win64-with-browser.zip  portable app + its own Built-in Chromium (the default
#                             channel; Edge/Chrome stay in the dropdown)
#   *-batch-source.zip        the .bat console flow (requires Python; setup
#                             downloads the libraries + Chromium)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.0); created at the chosen ref if it doesn't exist"
        required: true

permissions:
  contents: write

jobs:
  # The offline regression suite gates every release (v0.17.3 lesson: checks.yml
  # runs on push but a tag never WAITED on it, so a red suite could ship). This
  # job re-runs the full blocking suite via build/run_checks.py — the same
  # globbed set check_ci_manifest.py pins to checks.yml — and the build job
  # `needs` it, so a tag on a red suite cannot produce artifacts.
  offline-checks:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      PYTHONIOENCODING: utf-8            # the " ≠ " diff marker vs cp1252 stdout
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Chromium for the fake-site selector tests
        # Best-effort, mirroring checks.yml: check_fake_site falls back to the
        # runner's system Edge and skips cleanly if no browser is drivable.
        continue-on-error: true
        run: python -m playwright install chromium
      - name: Run the full offline check suite
        run: python build/run_checks.py -j 4

  build-and-release:
    needs: offline-checks
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      # Tag push: the pushed tag. Manual dispatch: the typed tag (gh release
      # create makes the tag at this commit if it doesn't exist yet).
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      # v5/v6 run on Node 24 — GitHub runners force Node 24 from June 16, 2026
      # and remove Node 20 on September 16, 2026 (the v0.10.0 run warned on
      # the older checkout@v4 / setup-python@v5).
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify the tag matches version.py
        shell: pwsh
        run: |
          $m = Select-String -Path version.py -Pattern '__version__\s*=\s*"([^"]+)"'
          if (-not $m) { throw "Could not read __version__ from version.py" }
          $v = $m.Matches[0].Groups[1].Value
          $expected = "v$v"
          if ($env:TAG -ne $expected) {
            throw "Release tag '$env:TAG' does not match version.py ('$expected'). Bump version.py or fix the tag before releasing."
          }
          Write-Host "OK: tag $env:TAG matches version.py ($v)."

      - name: Assemble release notes for this version (fast-fail before build)
        # Shared header + this version's CHANGELOG.md section only — so the
        # release shows what changed in THIS version, not the whole history.
        # Runs before the long build so a missing CHANGELOG section fails fast.
        run: python build/gen_release_notes.py "$env:TAG" -o notes.md

      - name: Build + gate the system-browser variant (exact-artifact release gate)
        # build.ps1 -SelfTest builds the windowed app, copies docs, prunes, then
        # runs THIS exe's --self-test. The resulting dist is the gated, shippable
        # artifact — zipped as-is below (no separate un-gated rebuild).
        run: powershell -ExecutionPolicy Bypass -File build\build.ps1 -SelfTest

      - name: Zip the system-browser variant (the gated artifact)
        run: Compress-Archive -Path "dist\TSMIS Exporter" -DestinationPath "TSMIS-Exporter-$env:TAG-win64.zip"

      - name: Build + gate the bundled-Chromium variant (exact-artifact release gate)
        run: |
          Remove-Item -Recurse -Force "dist\TSMIS Exporter"
          powershell -ExecutionPolicy Bypass -File build\build.ps1 -SelfTest -BundleChromium

      - name: Zip the bundled-Chromium variant (the gated artifact)
        run: Compress-Archive -Path "dist\TSMIS Exporter" -DestinationPath "TSMIS-Exporter-$env:TAG-win64-with-browser.zip"

      - name: Zip the batch/source variant
        run: git archive --format=zip --prefix="TSMIS-Exporter-batch/" -o "TSMIS-Exporter-$env:TAG-batch-source.zip" HEAD

      - name: Gate the batch/source ZIP — the EXACT uploaded archive (fails, never skips)
        # Gate the SAME zip that is published (--zip): clean-extract the archive into
        # a disposable dir and run the console menu→module dispatch smoke in a fresh
        # interpreter rooted there. Uses the build venv (it has the runtime deps the
        # source zip's setup.bat would install on a target).
        run: build\.venv\Scripts\python.exe build\check_source_zip_smoke.py --zip "TSMIS-Exporter-$env:TAG-batch-source.zip"

      # --- Code signing (SignPath) ------------------------------------------
      # Inert until the repo variable SIGNPATH_ENABLED is set to "true" (do that
      # once the SignPath Foundation project is approved) and the secret/vars
      # below are filled in. When enabled, the app zip is uploaded, submitted to
      # SignPath, and the signed artifact overwrites the local file BEFORE the
      # checksums + release steps below. Repeat the pair for the with-browser zip.
      # Docs: https://about.signpath.io/documentation/github-integration
      - name: Upload unsigned artifact (SignPath)
        if: ${{ vars.SIGNPATH_ENABLED == 'true' }}
        id: upload-unsigned-win64
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-win64
          path: TSMIS-Exporter-${{ env.TAG }}-win64.zip

      - name: Submit signing request (SignPath)
        if: ${{ vars.SIGNPATH_ENABLED == 'true' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: tsmis-reports-exporter
          signing-policy-slug: release-signing          # set to your SignPath policy slug
          github-artifact-id: ${{ steps.upload-unsigned-win64.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: .                  # overwrites the unsigned zip in place

      - name: Publish SHA-256 checksums
        shell: pwsh
        # One <asset>.sha256 per zip (sha256sum format: "<hash>  <name>"), so the
        # one-click updater can verify a download before installing it, and a
        # user can verify by hand. ASCII = no BOM (a BOM would corrupt the hash).
        run: |
          Get-ChildItem "TSMIS-Exporter-$env:TAG-*.zip" | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File "$($_.FullName).sha256" -Encoding ascii
            Write-Host "$hash  $($_.Name)"
          }

      - name: Verify every variant artifact + its .sha256 was produced (fails, never skips)
        shell: pwsh
        # Per-variant acceptance is ENFORCED here: each of the three published zips
        # AND its companion .sha256 must exist before the release is created. A
        # variant whose build/gate failed, or a missing checksum, FAILS the release
        # instead of silently shipping a partial set (R1-T06 / R1-M02). The earlier
        # -SelfTest (windowed exes) and console smoke (source zip) gates already fail
        # on a broken capability; this is the final artifact-completeness backstop.
        run: |
          $zips = @(
            "TSMIS-Exporter-$env:TAG-win64.zip",
            "TSMIS-Exporter-$env:TAG-win64-with-browser.zip",
            "TSMIS-Exporter-$env:TAG-batch-source.zip"
          )
          $missing = @()
          foreach ($z in $zips) {
            if (-not (Test-Path $z))          { $missing += $z }
            if (-not (Test-Path "$z.sha256")) { $missing += "$z.sha256" }
          }
          if ($missing.Count) {
            throw "Release artifacts missing (a build/gate/checksum step failed): $($missing -join ', ')"
          }
          Write-Host "OK: all 3 variant zips + their .sha256 checksums are present."

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$env:TAG"
          "TSMIS-Exporter-$env:TAG-win64.zip"
          "TSMIS-Exporter-$env:TAG-win64.zip.sha256"
          "TSMIS-Exporter-$env:TAG-win64-with-browser.zip"
          "TSMIS-Exporter-$env:TAG-win64-with-browser.zip.sha256"
          "TSMIS-Exporter-$env:TAG-batch-source.zip"
          "TSMIS-Exporter-$env:TAG-batch-source.zip.sha256"
          --target "${{ github.sha }}"
          --title "TSMIS Exporter $env:TAG"
          --notes-file notes.md
