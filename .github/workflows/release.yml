name: release

# Builds the three Windows release variants and publishes them as a GitHub
# release whenever a version tag (v*) is pushed. The -SelfTest builds run first
# as the release gate: each builds AND runs the frozen smoke test (browser
# launch + page.pdf + download, pdfplumber, openpyxl, GUI construction) over
# the pruned bundle — once against the runner's system Edge/Chrome and once
# against the bundled Chromium — so a broken bundle can never ship.
#
# Variants published:
#   *-win64.zip               portable app; drives the machine's installed Edge/Chrome
#   *-win64-with-browser.zip  portable app + its own Built-in Chromium (the default
#                             channel; Edge/Chrome stay in the dropdown)
#   *-batch-source.zip        the .bat console flow (requires Python; setup
#                             downloads the libraries + Chromium)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.0); created at the chosen ref if it doesn't exist"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      # Tag push: the pushed tag. Manual dispatch: the typed tag (gh release
      # create makes the tag at this commit if it doesn't exist yet).
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      # v5/v6 run on Node 24 — GitHub runners force Node 24 from June 16, 2026
      # and remove Node 20 on September 16, 2026 (the v0.10.0 run warned on
      # the older checkout@v4 / setup-python@v5).
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify the tag matches version.py
        shell: pwsh
        run: |
          $m = Select-String -Path version.py -Pattern '__version__\s*=\s*"([^"]+)"'
          if (-not $m) { throw "Could not read __version__ from version.py" }
          $v = $m.Matches[0].Groups[1].Value
          $expected = "v$v"
          if ($env:TAG -ne $expected) {
            throw "Release tag '$env:TAG' does not match version.py ('$expected'). Bump version.py or fix the tag before releasing."
          }
          Write-Host "OK: tag $env:TAG matches version.py ($v)."

      - name: Assemble release notes for this version (fast-fail before build)
        # Shared header + this version's CHANGELOG.md section only — so the
        # release shows what changed in THIS version, not the whole history.
        # Runs before the long build so a missing CHANGELOG section fails fast.
        run: python build/gen_release_notes.py "$env:TAG" -o notes.md

      - name: Build + run frozen self-test, system browser (release gate)
        run: powershell -ExecutionPolicy Bypass -File build\build.ps1 -SelfTest

      - name: Build + run frozen self-test, bundled Chromium (release gate)
        run: powershell -ExecutionPolicy Bypass -File build\build.ps1 -SelfTest -BundleChromium

      - name: Build the windowed app (system browser)
        run: powershell -ExecutionPolicy Bypass -File build\build.ps1

      - name: Zip the system-browser variant
        run: Compress-Archive -Path "dist\TSMIS Exporter" -DestinationPath "TSMIS-Exporter-$env:TAG-win64.zip"

      - name: Build the windowed app (bundled Chromium)
        run: |
          Remove-Item -Recurse -Force "dist\TSMIS Exporter"
          powershell -ExecutionPolicy Bypass -File build\build.ps1 -BundleChromium

      - name: Zip the bundled-Chromium variant
        run: Compress-Archive -Path "dist\TSMIS Exporter" -DestinationPath "TSMIS-Exporter-$env:TAG-win64-with-browser.zip"

      - name: Zip the batch/source variant
        run: git archive --format=zip --prefix="TSMIS-Exporter-batch/" -o "TSMIS-Exporter-$env:TAG-batch-source.zip" HEAD

      - name: Publish SHA-256 checksums
        shell: pwsh
        # One <asset>.sha256 per zip (sha256sum format: "<hash>  <name>"), so the
        # one-click updater can verify a download before installing it, and a
        # user can verify by hand. ASCII = no BOM (a BOM would corrupt the hash).
        run: |
          Get-ChildItem "TSMIS-Exporter-$env:TAG-*.zip" | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File "$($_.FullName).sha256" -Encoding ascii
            Write-Host "$hash  $($_.Name)"
          }

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$env:TAG"
          "TSMIS-Exporter-$env:TAG-win64.zip"
          "TSMIS-Exporter-$env:TAG-win64.zip.sha256"
          "TSMIS-Exporter-$env:TAG-win64-with-browser.zip"
          "TSMIS-Exporter-$env:TAG-win64-with-browser.zip.sha256"
          "TSMIS-Exporter-$env:TAG-batch-source.zip"
          "TSMIS-Exporter-$env:TAG-batch-source.zip.sha256"
          --target "${{ github.sha }}"
          --title "TSMIS Exporter $env:TAG"
          --notes-file notes.md
