<!doctype html>
<!--
The custom report dropdown (#customReport), reconstructed from index.html. The
site greys a temporarily-disabled report by adding the cs-disabled class to its
<li class="cs-option">. select_report() reads
  page.locator("#customReport li.cs-option", has_text=label).first
        .get_attribute("class")
and raises ReportUnavailableError when "cs-disabled" is in the class list.
Here the two ramp reports are cs-disabled (matching the captured live source),
while Highway Log etc. are enabled.
-->
<html>
<head><meta charset="utf-8"><title>dropdown</title></head>
<body>
  <div class="cs" id="customReport">
    <div class="cs-trigger">
      <span class="cs-value">-- Select report --</span>
      <span class="cs-arrow">&#9660;</span>
    </div>
    <ul class="cs-list">
      <li class="cs-option" data-value="highway_log">Highway Log</li>
      <li class="cs-option" data-value="highway_sequence">Highway Sequence Listing</li>
      <li class="cs-option" data-value="intersection_detail">Intersection Detail</li>
      <li class="cs-option" data-value="intersection_summary">Intersection Summary</li>
      <li class="cs-option cs-disabled" data-value="Ramp_Detail">TSAR: Ramp Detail</li>
      <li class="cs-option cs-disabled" data-value="Ramp_Summary">TSAR: Ramp Summary</li>
    </ul>
  </div>
</body>
</html>
