<!doctype html>
<!--
Highway Log, EMPTY state: unlike the ramp reports, hl_renderPage() renders the
action bar (Export present) EVEN for a no-row route, plus an empty table row
<td colspan="30" class="hl-empty">No results found in this segment.</td>.
wait_js resolves (Export present); is_empty must be True via the body text.
This is the contract that proves the engine doesn't click an Export that
no-ops on zero rows and then hang on a download that never starts.
-->
<html>
<head><meta charset="utf-8"><title>highway log: empty</title></head>
<body>
  <div id="rampResults" class="ramp-results" style="display:block;">
    <div class="report-action-bar">
      <button class="export-btn" onclick="hl_exportToExcel()">Export</button>
      <div class="report-title">
        <div class="report-title-line1">California Department of Transportation</div>
        <div class="report-title-line2">California State Highway Log</div>
      </div>
      <button class="export-btn" onclick="hl_printAll()">Print</button>
    </div>
    <div class="hl-table-wrap">
      <table class="hl-table">
        <thead><tr><th>PM</th><th>Description</th></tr></thead>
        <tbody><tr><td colspan="30" class="hl-empty">No results found in this segment.</td></tr></tbody>
      </table>
    </div>
  </div>
</body>
</html>
