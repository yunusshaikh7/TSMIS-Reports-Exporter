# Tooling config only — the app is not a package (it ships as a PyInstaller
# onefolder; see build/). This file exists so local `ruff check .` matches CI
# exactly (the rule set used to live only inline in checks.yml, scripts/ only).
[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["build/.venv", "build/pyi-work", "dist", "code-review"]

[tool.ruff.lint]
# The CI-BLOCKING set (T2/ARC-01, v0.19.0 — checks.yml fails the push on these):
# real-error rules (syntax errors, invalid prints, undefined names ANYWHERE —
# the BUG-01 NameError class is now statically impossible), plus shadowed
# redefinitions and dead imports. The deliberate re-export shims are exempted
# from unused-import below (their whole point is importing for re-export).
select = ["E9", "F63", "F7", "F82", "F811", "F401"]

[tool.ruff.lint.per-file-ignores]
# Re-export shims/facades: imports ARE the interface.
"scripts/common.py" = ["F401"]
"scripts/gui_worker.py" = ["F401"]
"scripts/matrix.py" = ["F401"]
