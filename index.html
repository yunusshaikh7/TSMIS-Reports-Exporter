<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TSMIS Reports Exporter — bulk-export Caltrans TSMIS reports</title>
  <meta name="description" content="Free, open-source Windows tool that bulk-exports Caltrans TSMIS reports for every California state route. Unzip and run — no install.">
  <link rel="canonical" href="https://yunusshaikh7.github.io/TSMIS-Reports-Exporter/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="TSMIS Reports Exporter">
  <meta property="og:description" content="Bulk-export Caltrans TSMIS reports for every California state route — in one click.">
  <meta property="og:url" content="https://yunusshaikh7.github.io/TSMIS-Reports-Exporter/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f6f8fc; --ink: #0f172a; --muted: #5b6577; --line: #e6eaf2;
      --brand: #0969da; --brand-2: #0a7ea4; --card: #fff;
      --shadow: 0 10px 40px rgba(16,24,40,.12);
      color-scheme: light dark;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f17; --ink: #e9eef7; --muted: #9aa6b8; --line: #1d2636;
        --brand: #4f9dff; --brand-2: #38bec9; --card: #111826;
        --shadow: 0 14px 50px rgba(0,0,0,.5);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 2.5rem 1.25rem;
      font-family: "Inter", -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--ink); line-height: 1.5; -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(800px 380px at 70% -5%, rgba(9,105,218,.18), transparent 60%),
        radial-gradient(640px 320px at 12% 5%, rgba(10,126,164,.16), transparent 55%),
        var(--bg);
    }
    a { color: inherit; text-decoration: none; }
    .pill {
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: .8rem; font-weight: 600; color: var(--muted);
      background: var(--card); border: 1px solid var(--line);
      padding: .35rem .8rem; border-radius: 999px; margin-bottom: 1.5rem;
    }
    .dot { width: .5rem; height: .5rem; border-radius: 50%; background: #22c55e; }
    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 800;
      letter-spacing: -.02em; line-height: 1.1; margin: 0 0 .8rem;
    }
    .grad { background: linear-gradient(90deg, var(--brand), var(--brand-2));
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    p.tag { font-size: clamp(1rem, 2.4vw, 1.2rem); color: var(--muted); margin: 0 0 2rem; max-width: 30ch; }
    .download {
      display: inline-flex; align-items: center; gap: .6rem;
      background: var(--brand); color: #fff; font-weight: 700; font-size: 1.15rem;
      padding: 1rem 2rem; border-radius: 12px; box-shadow: var(--shadow);
      transition: transform .08s ease, background .2s ease;
    }
    .download:hover { background: #0a5cc0; }
    .download:active { transform: translateY(1px); }
    .sub { margin-top: .9rem; font-size: .85rem; color: var(--muted); }
    .sub a { font-weight: 600; color: var(--brand); border-bottom: 1px solid transparent; }
    .sub a:hover { border-color: currentColor; }

    .shot {
      margin-top: 3rem; width: min(900px, 100%);
      border: 1px solid var(--line); border-radius: 14px;
      box-shadow: var(--shadow); overflow: hidden; background: var(--card);
    }
    .shot img { display: block; width: 100%; height: auto; }
    footer { margin-top: 2.5rem; font-size: .8rem; color: var(--muted); max-width: 52ch; }
    footer a { font-weight: 600; color: var(--brand); }
  </style>
</head>
<body>
  <span class="pill"><span class="dot"></span> Free &amp; open source · Windows</span>

  <h1>TSMIS Reports Exporter</h1>
  <p class="tag">Bulk-export every Caltrans TSMIS route — in one click.</p>

  <a class="download" href="https://github.com/yunusshaikh7/TSMIS-Reports-Exporter/releases/latest">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download for Windows
  </a>
  <p class="sub">Unzip and run — no installer · <a href="https://github.com/yunusshaikh7/TSMIS-Reports-Exporter">View on GitHub</a></p>

  <div class="shot">
    <picture>
      <source srcset="screenshot-dark.png" media="(prefers-color-scheme: dark)">
      <img src="screenshot-light.png" alt="TSMIS Reports Exporter app screenshot">
    </picture>
  </div>

  <footer>
    MIT licensed · Unofficial tool, not affiliated with or endorsed by Caltrans or the State of California.
  </footer>
</body>
</html>
